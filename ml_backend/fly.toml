# fly.toml file generated for animalmind-backend

app = "animalmind-backend"
primary_region = "mad"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "2gb"
